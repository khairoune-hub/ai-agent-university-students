# Local stack: Postgres + backend (API + Telegram bot).
#   docker compose up --build
#
# Fill .env first (TELEGRAM_BOT_TOKEN, OPENROUTER_API_KEY, admin creds).
# DATABASE_URL below is overridden to point at the bundled Postgres container.
#
# The admin frontend lives in a separate project (./admin, not in this repo) —
# run it on its own with NEXT_PUBLIC_API_URL=http://localhost:4000.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unibot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unibot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      # Override to use the bundled Postgres (internal compose network)
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/unibot
      PGSSL: "false"
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
